name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build APAC
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git g++ zlib1g-dev wget software-properties-common gnupg libzstd-dev lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18 all || true
          sudo apt-get install -y clang-18 libclang-18-dev llvm-18-dev clang-format-18

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake -DLLVM_DIR=/usr/lib/llvm-18/cmake ..
          make -j$(nproc)
          cd ..
          strip build/apac build/taskGraph build/declarationSplitter build/duplicateFunctions \
                build/conditionUnstack build/multipleDeclSplitter build/constify build/gotoRet \
                build/unstack build/stackheap build/mainParallel build/apacDepth

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: apac-binaries
          path: |
            build/apac
            build/taskGraph
            build/declarationSplitter
            build/duplicateFunctions
            build/conditionUnstack
            build/multipleDeclSplitter
            build/constify
            build/gotoRet
            build/unstack
            build/stackheap
            build/mainParallel
            build/apacDepth
          retention-days: 1

  test:
    name: Test APAC
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git g++ zlib1g-dev wget software-properties-common gnupg libzstd-dev lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18 all || true
          sudo apt-get install -y clang-18 libclang-18-dev llvm-18-dev clang-format-18

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: apac-binaries
          path: build/

      - name: Restore executable permissions
        run: |
          chmod +x build/apac build/taskGraph build/declarationSplitter build/duplicateFunctions \
                   build/conditionUnstack build/multipleDeclSplitter build/constify build/gotoRet \
                   build/unstack build/stackheap build/mainParallel build/apacDepth

      - name: Run test suite
        run: bash scripts/run-tests.sh
